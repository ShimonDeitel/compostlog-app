name: CompostLog
options:
  bundleIdPrefix: com.shimondeitel.compostlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  CompostLog:
    type: application
    platform: iOS
    sources:
      - path: CompostLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.compostlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: CompostLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CompostLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CompostLogTests
      - path: CompostLog.storekit
    dependencies:
      - target: CompostLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.compostlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CompostLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CompostLogUITests
    dependencies:
      - target: CompostLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.compostlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  CompostLog:
    build:
      targets:
        CompostLog: all
        CompostLogTests: [test]
        CompostLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: CompostLog.storekit
    test:
      config: Debug
      storeKitConfiguration: CompostLog.storekit
      targets:
        - CompostLogTests
        - CompostLogUITests
    archive:
      config: Release
